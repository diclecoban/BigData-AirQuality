version: "3.9"

services:
  kafka:
    image: "ADD_KAFKA_IMAGE"
    container_name: "airquality-kafka"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NOTES: "Fill broker configuration here"

  spark:
    image: "ADD_SPARK_IMAGE"
    container_name: "airquality-spark"
    ports:
      - "4040:4040"
    environment:
      SPARK_NOTES: "Fill Spark master and worker configuration here"

  grafana:
    image: "grafana/grafana:latest"
    container_name: "airquality-grafana"
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"

  mlflow:
    image: "ADD_MLFLOW_IMAGE"
    container_name: "airquality-mlflow"
    ports:
      - "5000:5000"
    environment:
      MLFLOW_NOTES: "Fill tracking server configuration here"
